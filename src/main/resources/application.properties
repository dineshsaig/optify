# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=job-finder
server.port=8080

# ── H2 embedded database ─────────────────────────────────────────────────────
# File-based H2 so data survives restarts (stored in ~/job-finder-db)
spring.datasource.url=jdbc:h2:file:./data/job-finder-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console  (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# update = add columns / tables without dropping data; use validate in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Scheduler thread pool ────────────────────────────────────────────────────
spring.task.scheduling.pool.size=2

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.example.jobfinder=INFO
logging.level.org.springframework.scheduling=INFO

# ── To switch to PostgreSQL later, replace the datasource block with: ─────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/jobfinder
# spring.datasource.username=postgres
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
